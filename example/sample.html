<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furiza AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #4ECDC4 0%, #45B8AF 50%, #2DD4BF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .title-box {
            background: linear-gradient(135deg, #7FE5DC 0%, #5FD8CC 100%);
            border-radius: 30px;
            padding: 20px 40px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .title-box h1 {
            color: #FF8C42;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
        }

        .close-btn {
            background-color: #EF5350;
            border: none;
            border-radius: 20px;
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background-color: #E53935;
            transform: scale(1.1);
        }

        .content {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .bot-card {
            background: linear-gradient(135deg, #1E88E5 0%, #1976D2 100%);
            border-radius: 25px;
            padding: 20px;
            width: 280px;
            flex-shrink: 0;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .bot-illustration {
            background: linear-gradient(135deg, #42A5F5 0%, #1E88E5 100%);
            border-radius: 20px;
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .bot-head {
            background-color: #0D47A1;
            border-radius: 15px 15px 0 0;
            width: 100%;
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        .bot-eye {
            width: 12px;
            height: 12px;
            background-color: #4FC3F7;
            border-radius: 50%;
        }

        .bot-arms {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .bot-arm {
            width: 40px;
            height: 30px;
            background-color: #D4A500;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .bot-name {
            color: #1B5E20;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }

        .chat-area {
            background: linear-gradient(135deg, #1E88E5 0%, #1565C0 100%);
            border-radius: 25px;
            padding: 30px;
            flex: 1;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #B3E5FC;
            font-size: 18px;
            text-align: center;
        }

        .input-area {
            background: linear-gradient(135deg, #B2DFDB 0%, #80DEEA 100%);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 20px;
            padding: 15px 25px;
            font-size: 16px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: #424242;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-area input:focus {
            box-shadow: 0 0 0 4px rgba(79, 195, 247, 0.3);
        }

        .input-area input::placeholder {
            color: #9E9E9E;
        }

        .send-btn {
            background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
            border: none;
            border-radius: 20px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #F57C00 0%, #E65100 100%);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            .bot-card {
                width: 100%;
            }

            .title-box h1 {
                font-size: 24px;
            }

            .close-btn {
                width: 50px;
                height: 50px;
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-box">
                <h1>Welcome To Furiza AI</h1>
            </div>
            <button class="close-btn">✕</button>
        </div>

        <div class="content">
            <div class="bot-card">
                <div class="bot-illustration">
                    <div class="bot-head">
                        <div class="bot-eye"></div>
                        <div class="bot-eye"></div>
                    </div>
                    <div class="bot-arms">
                        <div class="bot-arm"></div>
                        <div class="bot-arm"></div>
                    </div>
                </div>
                <div class="bot-name">Bluebot concept</div>
            </div>

            <div class="chat-area">
                Start a conversation...
            </div>
        </div>

        <div class="input-area">
            <input type="text" placeholder="Ask anything . . ." />
            <button class="send-btn">➤</button>
        </div>
    </div>

    <script>
        document.querySelector('.close-btn').addEventListener('click', function() {
            if (confirm('Are you sure you want to close?')) {
                window.close();
            }
        });

        document.querySelector('.send-btn').addEventListener('click', function() {
            const input = document.querySelector('.input-area input');
            if (input.value.trim()) {
                const chatArea = document.querySelector('.chat-area');
                const message = document.createElement('div');
                message.textContent = input.value;
                chatArea.appendChild(message);
                input.value = '';
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        });

        document.querySelector('.input-area input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.querySelector('.send-btn').click();
            }
        });
    </script>
</body>
</html>
